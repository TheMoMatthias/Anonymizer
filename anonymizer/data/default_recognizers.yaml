# Default entity/recognizer configuration.
# Editable directly, or via the Settings tab in the app (which writes back here).
languages:
  - de
  - en

# Trust-tier boundaries (score -> high/medium/low). High-tier findings are
# eligible for auto-accept; medium/low are surfaced for active review.
# high is set ABOVE spaCy's flat 0.85 NER confidence on purpose: raw name/place
# guesses land in "review", while checksum-validated IDs (0.98) and context-
# boosted matches auto-accept. This is what keeps fallible free-text NER under
# human eyes without burying the reviewer in confident structured IDs.
tiers:
  high: 0.9
  medium: 0.5

# Global recall<->precision offset (the sensitivity slider). Positive lowers
# every detection threshold (more recall, more review); 0 = shipped behaviour.
sensitivity: 0.0

# Default posture: pseudonymize (preserves relationships for downstream AI),
# with hard one-way anonymize reserved for the highest-sensitivity identifiers
# (tax ID, social-security number, payment cards). All editable in Settings.
entities:
  PERSON:
    default_action: pseudonymize
    confidence_threshold: 0.6
  ORGANIZATION:
    default_action: pseudonymize
    confidence_threshold: 0.6
  LOCATION:
    default_action: pseudonymize
    confidence_threshold: 0.6
  EMAIL_ADDRESS:
    default_action: pseudonymize
    confidence_threshold: 0.5
  PHONE_NUMBER:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DATE_TIME:
    default_action: pseudonymize
    confidence_threshold: 0.5
  IBAN_CODE:
    default_action: pseudonymize
    confidence_threshold: 0.4
  CREDIT_CARD:
    default_action: anonymize
    confidence_threshold: 0.4
  DE_STEUER_ID:
    default_action: anonymize
    confidence_threshold: 0.6
  DE_SV_NUMMER:
    default_action: anonymize
    confidence_threshold: 0.7
  DE_KONTONUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6
  DE_DEPOTNUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6
  BANK_INTERNAL_REF:
    default_action: pseudonymize
    confidence_threshold: 0.5

# Structural/banking words the German NER model routinely mislabels as
# people/orgs/places. They are never PII, so suppressing them is pure precision
# with no recall cost. Extend freely in Settings.
allow_list:
  - IBAN
  - BIC
  - Kunde
  - Kundin
  - Konto
  - Kontonummer
  - Depot
  - Depotnummer
  - Steuer-ID
  - Steuernummer
  - Sozialversicherungsnummer
  - Betrag
  - Datum
  - EUR
  - Euro
  - GmbH
  - Vertraulich
deny_list: []

# Small curated set of German bank-specific recognizers Presidio doesn't ship.
# context words boost score when found near a match (Presidio's built-in context logic).
custom_recognizers:
  - name: DE_STEUER_ID
    language: de
    patterns:
      - regex: '\b\d{2}\s?\d{3}\s?\d{3}\s?\d{3}\b'
        score: 0.6
    context: ["steuer-id", "steueridentifikationsnummer", "steuernummer"]
  - name: DE_SV_NUMMER
    language: de
    patterns:
      - regex: '\b\d{2}[ ]?\d{6}[ ]?[A-Z][ ]?\d{3}\b'
        score: 0.6
    context: ["sozialversicherungsnummer", "rentenversicherungsnummer", "sv-nummer"]
  - name: DE_KONTONUMMER
    language: de
    patterns:
      - regex: '\b\d{6,10}\b'
        score: 0.3
    context: ["kontonummer", "konto-nr", "konto nr"]
  - name: DE_DEPOTNUMMER
    language: de
    patterns:
      - regex: '\b\d{6,12}\b'
        score: 0.3
    context: ["depotnummer", "depot-nr", "depot nr"]
  - name: BANK_INTERNAL_REF
    language: de
    patterns:
      - regex: '\b[A-Z]{2,4}-\d{4,10}\b'
        score: 0.3
    context: ["kunde nr", "kundennummer", "deal id", "referenznummer"]
