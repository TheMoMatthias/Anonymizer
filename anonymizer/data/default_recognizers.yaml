# Default entity/recognizer configuration.
# Editable directly, or via the Settings tab in the app (which writes back here).
#
# config_schema_version: BUMP THIS whenever a shipped built-in definition changes
# and existing users must pick it up (an entity threshold, a built-in recognizer
# regex, tier boundaries). On a bump, load_config re-syncs the code-owned
# built-ins from this file ONCE, while preserving user-owned data (allow/deny
# lists, sensitivity, name_column_headers, user-ADDED recognizers). Without this,
# the additive-only merge left every existing config permanently stuck on the
# first-run defaults -- e.g. NER_MISC at 0.5 long after it shipped at 0.75.
config_schema_version: 5

languages:
  - de
  - en

# Topical (non-personal) sensitivity: internal tools, divisions, departments,
# licensees, confidential project descriptions. Detection is structure-driven --
# a column whose header matches a category's header_terms (substring, case-
# insensitive) makes every cell in that column that category; those values seed
# an auto-gazetteer that propagates document-wide. No manual list required
# (manual terms can be added per category). Per-category default ACTION lives in
# the entities block above; the term maps live here.
topical:
  enabled: true
  # header_terms are matched as WHOLE WORDS (word boundaries), not substrings --
  # a category column triggers whole-column redaction, so defaults are kept
  # high-precision and conservative. Add your own compound headers per deployment.
  categories:
    TOOL:
      header_terms: [tool, tools, system, systeme, software, applikation, application,
                     plattform, platform, framework]
      terms: []
    DIVISION:
      header_terms: [division, bereich, geschäftsbereich, geschaeftsbereich, sparte, ressort]
      terms: []
    DEPARTMENT:
      header_terms: [abteilung, team, referat, fachbereich, organisationseinheit]
      terms: []
    LICENSEE:
      header_terms: [lizenzgeber, lizenznehmer, lizenz, anbieter, hersteller,
                     vendor, dienstleister, zulieferer]
      terms: []
    PROJECT:
      header_terms: [projekt, projektname, projekttitel, vorhaben, initiative]
      terms: []
    # Free-text description columns -- whole cell summarized (not propagated).
    # Compound headers ARE listed explicitly since word-boundary matching won't
    # find 'beschreibung' inside 'Projektbeschreibung'.
    DESCRIPTION:
      header_terms: [beschreibung, projektbeschreibung, kurzbeschreibung, nutzenbeschreibung,
                     notiz, notizen, kommentar, kommentare, bemerkung, bemerkungen, freitext,
                     details, inhalt, oldvalue, newvalue, altervalue, neuervalue]
      terms: []

# Trust-tier boundaries (score -> high/medium/low). High-tier findings are
# eligible for auto-accept; medium/low are surfaced for active review.
# high is set ABOVE spaCy's flat 0.85 NER confidence on purpose: raw name/place
# guesses land in "review", while checksum-validated IDs (0.98) and context-
# boosted matches auto-accept. This is what keeps fallible free-text NER under
# human eyes without burying the reviewer in confident structured IDs.
tiers:
  high: 0.9
  medium: 0.5

# Global recall<->precision offset (the sensitivity slider). Positive lowers
# every detection threshold (more recall, more review); 0 = shipped behaviour.
sensitivity: 0.0

# Corroboration-only for the free-text "medium sensitivity" NER types
# (ORGANIZATION / LOCATION / NER_MISC): when true, one of these is surfaced only
# if something beyond a bare spaCy guess backs it (a pattern/anchor/propagation
# source, a checksum verdict, or a name-column override). Strips the product
# names / jargon / common nouns that dominate false positives on business
# documents. PERSON and structured IDs are never affected. Set false for a
# recall-first deployment that wants every raw NER guess surfaced for review.
corroboration_only: true

# Default posture: pseudonymize (preserves relationships for downstream AI),
# with hard one-way anonymize reserved for the highest-sensitivity identifiers
# (tax ID, social-security number, payment cards). All editable in Settings.
entities:
  PERSON:
    default_action: pseudonymize
    confidence_threshold: 0.6
  ORGANIZATION:
    default_action: pseudonymize
    confidence_threshold: 0.6
  LOCATION:
    default_action: pseudonymize
    confidence_threshold: 0.6
  EMAIL_ADDRESS:
    default_action: pseudonymize
    confidence_threshold: 0.5
  PHONE_NUMBER:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DE_PHONE:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DATE_TIME:
    default_action: pseudonymize
    confidence_threshold: 0.5
  IBAN_CODE:
    default_action: pseudonymize
    confidence_threshold: 0.4
  CREDIT_CARD:
    default_action: anonymize
    confidence_threshold: 0.4
  DE_STEUER_ID:
    default_action: anonymize
    confidence_threshold: 0.6
  DE_SV_NUMMER:
    default_action: anonymize
    confidence_threshold: 0.7
  DE_KONTONUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6
  DE_DEPOTNUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6
  BANK_INTERNAL_REF:
    default_action: pseudonymize
    confidence_threshold: 0.5
  # spaCy tags entities it cannot classify as MISC and puts real names there
  # ("Frau Bauer"). Presidio dropped them outright; now they surface for review.
  NER_MISC:
    default_action: pseudonymize
    # 0.75, not 0.5: MISC is spaCy's catch-all for anything it can't confidently
    # classify (engine.py's _ENTITY_MAPPING comment), and its flat NER score is
    # ~0.85 regardless of confidence -- a 0.5 floor let almost every raw MISC
    # hit through, including ordinary words ("aber", "abdeckung") the model
    # mis-tagged. 0.75 still clears for a plain MISC hit by default (recall
    # intact) while sitting well above generic-word noise. Paired with the
    # lowercase/stopword filters in core.py's detect_unit.
    confidence_threshold: 0.75
  # Nationality / religious or political group (spaCy NORP -> presidio NRP; the
  # English model produces it, the German model does not). GDPR Art. 9 special
  # category -> anonymize (one-way), surfaced for review rather than auto-accepted.
  NRP:
    default_action: anonymize
    confidence_threshold: 0.5
  BIC_CODE:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DE_ADDRESS:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DE_KUNDENNUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6
  # Topical (non-personal) categories -- detected structurally (header->category)
  # and by the auto-gazetteer, not by NER thresholds; the low threshold just keeps
  # them surfaced. Named things pseudonymize to consistent reversible tokens
  # (keeps referential structure for a downstream LLM); PROJECT descriptions
  # become 'summarize' once that mode ships (Phase B) -- 'anonymize' until then.
  TOOL:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DIVISION:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DEPARTMENT:
    default_action: pseudonymize
    confidence_threshold: 0.5
  LICENSEE:
    default_action: pseudonymize
    confidence_threshold: 0.5
  PROJECT:
    # A project NAME is a name -> pseudonymize (consistent reversible token).
    default_action: pseudonymize
    confidence_threshold: 0.5
  DESCRIPTION:
    # Free-text description columns (Beschreibung/Notiz/Kommentar/OldValue/...) ->
    # summarize the whole cell to a zero-content structural placeholder.
    default_action: summarize
    confidence_threshold: 0.5
  POSSIBLE_TOPICAL:
    default_action: skip
    confidence_threshold: 0.5

# Structural/banking words the German NER model routinely mislabels as
# people/orgs/places. They are never PII, so suppressing them is pure precision
# with no recall cost. Extend freely in Settings.
allow_list:
  - IBAN
  - BIC
  - Kunde
  - Kundin
  - Konto
  - Kontonummer
  - Depot
  - Depotnummer
  - Steuer-ID
  - Steuernummer
  - Sozialversicherungsnummer
  - Betrag
  - Datum
  - EUR
  - Euro
  - GmbH
  - Vertraulich
  # Business / tech / project jargon that free-text NER repeatedly mis-flags as
  # an org/place/person on internal documents but which is never PII. Editable
  # in Settings; extend per workbook.
  - CAPEX
  - OPEX
  - RAG
  - DORA
  - GRC
  - DMS
  - CRM
  - KPI
  - ROI
  - LTV
  - FTE
  - PoC
  - MVP
  - RFP
  - OCR
  - LLM
  - KI
  - API
  - Baseline
  - Build
  - Backlog
  - Roadmap
  - Alerting
  - Onboarding
  - Reporting
  - Dashboard
  - Workflow
  - Review
  - Research
  - Status
  - Gate
  - To-Be
  - As-Is
  - Lessons Learned
  - Human-in-the-Loop
  - ReadOnly
  - Personas
  - Persona
deny_list: []

# Extra spreadsheet column-header words that mark a column as PEOPLE (matched
# case-insensitively as a substring). A matching header makes every cell in the
# column be treated as a name -- this catches bare surnames NER misses in a table
# cell. Built-in stems already cover Name/Kunde/Sachbearbeiter/Ansprechpartner/
# Projektleiter/Betreuer/Verantwortlich/... ; add your workbook's own here.
name_column_headers: []

# Small curated set of German bank-specific recognizers Presidio doesn't ship.
# context words boost score when found near a match (Presidio's built-in context logic).
custom_recognizers:
  # Context words are matched as a SUBSTRING of a token's lemma, so the short
  # stem does all the work ("konto" already matches kontonummer / kontoinhaber /
  # Kontos) and any entry containing a space can NEVER match a single token.
  # Keep these as short single-token stems.
  - name: DE_STEUER_ID
    language: de
    patterns:
      - regex: '\b\d{2}\s?\d{3}\s?\d{3}\s?\d{3}\b'
        score: 0.6
    context: ["steuer"]
  - name: DE_SV_NUMMER
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b\d{2}[ ]?\d{6}[ ]?[A-Z][ ]?\d{3}\b'
        score: 0.6
    context: ["versicherungsnummer", "sv-nummer", "rentenversicherung"]
  - name: DE_KONTONUMMER
    language: de
    patterns:
      - regex: '\b\d{6,10}\b'
        score: 0.3
    context: ["konto", "kto"]
  - name: DE_DEPOTNUMMER
    language: de
    patterns:
      - regex: '\b\d{6,12}\b'
        score: 0.3
    context: ["depot"]
  - name: BANK_INTERNAL_REF
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b[A-Z]{2,4}-\d{4,10}\b'
        score: 0.3
    context: ["kunde", "referenz", "vorgang"]
  # German phone numbers. Claims phone-shaped spans so they classify as Contact
  # rather than being mislabeled DATE_TIME by the English NER pass. Score is set
  # high enough to win the span over spaCy's flat 0.85 date guess when context
  # (telefon/tel/mobil/fax...) is present.
  - name: DE_PHONE
    language: de
    patterns:
      - regex: '(?<![\dA-Za-z])(?:(?:\+|00)49[\s\-/().]*|0)\d(?:[\s\-/().]*\d){5,}(?!\d)'
        score: 0.6
    context: ["telefon", "tel", "tel.", "mobil", "handy", "fax", "durchwahl", "phone", "rufnummer"]
  # BIC / SWIFT. Base score kept low so it only clears threshold with a
  # bic/swift context word nearby -- this keeps ordinary 8-letter uppercase
  # words from being flagged; an unlabeled BIC still surfaces via the
  # completeness scan's country-code-gated backstop.
  # case_sensitive is REQUIRED here: Presidio's PatternRecognizer defaults to
  # IGNORECASE, which made this [A-Z] pattern match ordinary lowercase German
  # words ("geehrter"). Context words must be single tokens -- Presidio matches
  # a context word as a substring of a token's lemma, so any entry containing a
  # space ("bank identifier") can never match anything.
  - name: BIC_CODE
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
        score: 0.4
    context: ["bic", "swift"]
  # German postal address: a street+house-number, or a PLZ paired with a city.
  # Pairing (5-digit PLZ + capitalized word) keeps a bare 5-digit number from
  # matching. de_core_news_lg NER catches city NAMES only, not full addresses.
  - name: DE_ADDRESS
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b[A-ZÄÖÜ][\wäöüß.\-]*(?:stra(?:ße|sse)|str\.|weg|allee|platz|gasse|ring|damm|ufer)\s+\d{1,4}\s?[a-z]?\b'
        score: 0.6
      # PLZ + city. Negative lookahead excludes a 5-digit AMOUNT/COUNT followed
      # by a currency or unit word ("66450 Euro", "39870 Minuten") -- those are
      # not addresses and were a measured false positive in a financial workbook.
      - regex: '\b\d{5}\s+(?!(?:Euro|EUR|USD|CHF|GBP|Cent|Minuten?|Stunden?|Tage?|Tagen|Sekunden?|Wochen?|Monate?n?|Jahre?n?|Prozent|Stück|Stk|Mio|Mrd|Tsd)\b)[A-ZÄÖÜ][a-zäöüß.\-]+\b'
        score: 0.5
    context: ["adresse", "anschrift", "wohnhaft", "straße", "plz", "postleitzahl", "wohnort"]
  # Bare numeric customer number (Kundennummer 4830123). Context-gated like the
  # account/depot recognizers so it doesn't flag every 5-12 digit run.
  - name: DE_KUNDENNUMMER
    language: de
    patterns:
      - regex: '\b\d{5,12}\b'
        score: 0.3
    context: ["kunde", "kdnr", "kd-nr"]
  # German date (dd.mm.yyyy). The German spaCy model emits NO DATE entity, so
  # without this a Geburtsdatum is never detected on German-routed documents.
  # Surfaced for review (low-sensitivity "Dates & other" class); profiles decide
  # whether dates are redacted or skipped.
  - name: DATE_TIME
    language: de
    patterns:
      - regex: '\b(0?[1-9]|[12]\d|3[01])\.(0?[1-9]|1[0-2])\.(19|20)\d{2}\b'
        score: 0.5
    context: ["geboren", "geburtsdatum", "geb", "geb.", "datum", "vom", "stand"]
