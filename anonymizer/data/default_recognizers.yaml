# Default entity/recognizer configuration.
# Editable directly, or via the Settings tab in the app (which writes back here).
languages:
  - de
  - en

# Trust-tier boundaries (score -> high/medium/low). High-tier findings are
# eligible for auto-accept; medium/low are surfaced for active review.
# high is set ABOVE spaCy's flat 0.85 NER confidence on purpose: raw name/place
# guesses land in "review", while checksum-validated IDs (0.98) and context-
# boosted matches auto-accept. This is what keeps fallible free-text NER under
# human eyes without burying the reviewer in confident structured IDs.
tiers:
  high: 0.9
  medium: 0.5

# Global recall<->precision offset (the sensitivity slider). Positive lowers
# every detection threshold (more recall, more review); 0 = shipped behaviour.
sensitivity: 0.0

# Default posture: pseudonymize (preserves relationships for downstream AI),
# with hard one-way anonymize reserved for the highest-sensitivity identifiers
# (tax ID, social-security number, payment cards). All editable in Settings.
entities:
  PERSON:
    default_action: pseudonymize
    confidence_threshold: 0.6
  ORGANIZATION:
    default_action: pseudonymize
    confidence_threshold: 0.6
  LOCATION:
    default_action: pseudonymize
    confidence_threshold: 0.6
  EMAIL_ADDRESS:
    default_action: pseudonymize
    confidence_threshold: 0.5
  PHONE_NUMBER:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DE_PHONE:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DATE_TIME:
    default_action: pseudonymize
    confidence_threshold: 0.5
  IBAN_CODE:
    default_action: pseudonymize
    confidence_threshold: 0.4
  CREDIT_CARD:
    default_action: anonymize
    confidence_threshold: 0.4
  DE_STEUER_ID:
    default_action: anonymize
    confidence_threshold: 0.6
  DE_SV_NUMMER:
    default_action: anonymize
    confidence_threshold: 0.7
  DE_KONTONUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6
  DE_DEPOTNUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6
  BANK_INTERNAL_REF:
    default_action: pseudonymize
    confidence_threshold: 0.5
  # spaCy tags entities it cannot classify as MISC and puts real names there
  # ("Frau Bauer"). Presidio dropped them outright; now they surface for review.
  NER_MISC:
    default_action: pseudonymize
    confidence_threshold: 0.5
  BIC_CODE:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DE_ADDRESS:
    default_action: pseudonymize
    confidence_threshold: 0.5
  DE_KUNDENNUMMER:
    default_action: pseudonymize
    confidence_threshold: 0.6

# Structural/banking words the German NER model routinely mislabels as
# people/orgs/places. They are never PII, so suppressing them is pure precision
# with no recall cost. Extend freely in Settings.
allow_list:
  - IBAN
  - BIC
  - Kunde
  - Kundin
  - Konto
  - Kontonummer
  - Depot
  - Depotnummer
  - Steuer-ID
  - Steuernummer
  - Sozialversicherungsnummer
  - Betrag
  - Datum
  - EUR
  - Euro
  - GmbH
  - Vertraulich
deny_list: []

# Small curated set of German bank-specific recognizers Presidio doesn't ship.
# context words boost score when found near a match (Presidio's built-in context logic).
custom_recognizers:
  # Context words are matched as a SUBSTRING of a token's lemma, so the short
  # stem does all the work ("konto" already matches kontonummer / kontoinhaber /
  # Kontos) and any entry containing a space can NEVER match a single token.
  # Keep these as short single-token stems.
  - name: DE_STEUER_ID
    language: de
    patterns:
      - regex: '\b\d{2}\s?\d{3}\s?\d{3}\s?\d{3}\b'
        score: 0.6
    context: ["steuer"]
  - name: DE_SV_NUMMER
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b\d{2}[ ]?\d{6}[ ]?[A-Z][ ]?\d{3}\b'
        score: 0.6
    context: ["versicherungsnummer", "sv-nummer", "rentenversicherung"]
  - name: DE_KONTONUMMER
    language: de
    patterns:
      - regex: '\b\d{6,10}\b'
        score: 0.3
    context: ["konto", "kto"]
  - name: DE_DEPOTNUMMER
    language: de
    patterns:
      - regex: '\b\d{6,12}\b'
        score: 0.3
    context: ["depot"]
  - name: BANK_INTERNAL_REF
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b[A-Z]{2,4}-\d{4,10}\b'
        score: 0.3
    context: ["kunde", "referenz", "vorgang"]
  # German phone numbers. Claims phone-shaped spans so they classify as Contact
  # rather than being mislabeled DATE_TIME by the English NER pass. Score is set
  # high enough to win the span over spaCy's flat 0.85 date guess when context
  # (telefon/tel/mobil/fax...) is present.
  - name: DE_PHONE
    language: de
    patterns:
      - regex: '(?<![\dA-Za-z])(?:(?:\+|00)49[\s\-/().]*|0)\d(?:[\s\-/().]*\d){5,}(?!\d)'
        score: 0.6
    context: ["telefon", "tel", "tel.", "mobil", "handy", "fax", "durchwahl", "phone", "rufnummer"]
  # BIC / SWIFT. Base score kept low so it only clears threshold with a
  # bic/swift context word nearby -- this keeps ordinary 8-letter uppercase
  # words from being flagged; an unlabeled BIC still surfaces via the
  # completeness scan's country-code-gated backstop.
  # case_sensitive is REQUIRED here: Presidio's PatternRecognizer defaults to
  # IGNORECASE, which made this [A-Z] pattern match ordinary lowercase German
  # words ("geehrter"). Context words must be single tokens -- Presidio matches
  # a context word as a substring of a token's lemma, so any entry containing a
  # space ("bank identifier") can never match anything.
  - name: BIC_CODE
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
        score: 0.4
    context: ["bic", "swift"]
  # German postal address: a street+house-number, or a PLZ paired with a city.
  # Pairing (5-digit PLZ + capitalized word) keeps a bare 5-digit number from
  # matching. de_core_news_lg NER catches city NAMES only, not full addresses.
  - name: DE_ADDRESS
    language: de
    case_sensitive: true
    patterns:
      - regex: '\b[A-ZÄÖÜ][\wäöüß.\-]*(?:stra(?:ße|sse)|str\.|weg|allee|platz|gasse|ring|damm|ufer)\s+\d{1,4}\s?[a-z]?\b'
        score: 0.6
      - regex: '\b\d{5}\s+[A-ZÄÖÜ][a-zäöüß.\-]+\b'
        score: 0.5
    context: ["adresse", "anschrift", "wohnhaft", "straße", "plz", "postleitzahl", "wohnort"]
  # Bare numeric customer number (Kundennummer 4830123). Context-gated like the
  # account/depot recognizers so it doesn't flag every 5-12 digit run.
  - name: DE_KUNDENNUMMER
    language: de
    patterns:
      - regex: '\b\d{5,12}\b'
        score: 0.3
    context: ["kunde", "kdnr", "kd-nr"]
  # German date (dd.mm.yyyy). The German spaCy model emits NO DATE entity, so
  # without this a Geburtsdatum is never detected on German-routed documents.
  # Surfaced for review (low-sensitivity "Dates & other" class); profiles decide
  # whether dates are redacted or skipped.
  - name: DATE_TIME
    language: de
    patterns:
      - regex: '\b(0?[1-9]|[12]\d|3[01])\.(0?[1-9]|1[0-2])\.(19|20)\d{2}\b'
        score: 0.5
    context: ["geboren", "geburtsdatum", "geb", "geb.", "datum", "vom", "stand"]
